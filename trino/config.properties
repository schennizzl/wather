coordinator=true
node-scheduler.include-coordinator=true
http-server.http.port=8080
discovery.uri=http://localhost:8080

# Single-node local profile for a 20 GB RAM container.
# Heap stays below the container limit, with explicit headroom for off-heap/native memory.
query.max-memory=6GB
query.max-memory-per-node=6GB
query.max-total-memory=8GB
memory.heap-headroom-per-node=2GB
