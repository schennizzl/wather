            description: "Raw JSON payload as text."
          - name: source_file
            description: "Fully qualified MinIO object path."
          - name: ingested_at
            description: "Airflow logical timestamp for the load."
          - name: dt
            description: "Partition date."
          - name: hour
            description: "Hour partition within the date."

      - name: twitch_viewers_files
        description: "20-minute Twitch viewer payload envelopes for tracked games."
        columns:
          - name: payload
            description: "Raw JSON payload as text."
          - name: source_file
            description: "Fully qualified MinIO object path."
          - name: ingested_at
            description: "Airflow logical timestamp for the load."
          - name: dt
            description: "Partition date."
          - name: hour
            description: "Hour partition within the date."

      - name: twitch_channels_files
        description: "20-minute Twitch channel payload envelopes for tracked games."
        columns:
          - name: payload
            description: "Raw JSON payload as text."
          - name: source_file
            description: "Fully qualified MinIO object path."
