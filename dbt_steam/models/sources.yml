version: 2

sources:
  - name: raw
    description: "Raw payload tables over NDJSON envelopes in MinIO, exposed via Trino Hive catalog."
    schema: raw
    tables:
      - name: store_daily_files
        description: "Daily Steam app list payload envelopes written by Airflow."
        columns:
          - name: payload
            description: "Raw JSON payload as text."
          - name: source_file
            description: "Fully qualified MinIO object path."
          - name: ingested_at
            description: "Airflow logical timestamp for the load."
          - name: dt
            description: "Partition date."

      - name: appdetails_types_files
        description: "Incremental Steam app type payload envelopes."
        columns:
          - name: payload
            description: "Raw JSON payload as text."
          - name: source_file
            description: "Fully qualified MinIO object path."
          - name: ingested_at
            description: "Airflow logical timestamp for the load."
          - name: dt
            description: "Partition date."
          - name: hour
            description: "Hour partition within the date."

      - name: appdetails_daily_files
        description: "Daily Steam appdetails payload envelopes."
        columns:
          - name: payload
            description: "Raw JSON payload as text."
          - name: source_file
            description: "Fully qualified MinIO object path."
          - name: ingested_at
            description: "Airflow logical timestamp for the load."
          - name: dt
            description: "Partition date."

      - name: game_online_files
        description: "5-minute current player payload envelopes for tracked games."
        columns:
